name: MLOps Automation Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-stage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 src/ tests/ \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics

      - name: Run Unit Tests
        run: |
          pytest tests/ -v

      - name: Execute Model Training Pipeline
        run: |
          python src/download_data.py
          python src/train.py

      - name: Upload MLflow Tracking Data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-runs
          path: src/mlruns/
          if-no-files-found: warn

      - name: Upload Model Artifacts and Plots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: src/artifacts/
          if-no-files-found: warn